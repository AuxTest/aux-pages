<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI-SMM-Бот — скоро</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0f0f0f;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui,-apple-system,sans-serif;color:#888;gap:20px}
  .emoji{font-size:64px;line-height:1;animation:pulse 2s ease-in-out infinite}
  .title{font-size:18px;font-weight:600;color:#22c55e;letter-spacing:.05em}
  .subtitle{font-size:13px;color:#555;max-width:320px;text-align:center;line-height:1.5}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
</style>
</head>
<body>
  <div class="emoji">⚡</div>
  <div class="title">AI-SMM-Бот</div>
  <div class="subtitle">Скоро запуск. Подпишись на канал, чтобы первым попробовать.</div>
</body>
</html>
