<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>∧ux pages</title>
<style>
:root {
  --navy: #070B18;
  --purple: #6D3CFF;
  --purple-glow: rgba(109, 60, 255, 0.3);
  --silver: #C8D3E8;
  --lime: #C8FF3D;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif;
  background: var(--navy);
  color: var(--silver);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

.content {
  position: relative;
  z-index: 1;
  text-align: center;
}

.logo {
  font-size: 48px;
  font-weight: 800;
  letter-spacing: -2px;
  color: #fff;
  margin-bottom: 8px;
}

.logo span {
  color: var(--purple);
}

.orbit-container {
  position: relative;
  width: 300px;
  height: 300px;
  margin: 40px auto;
}

.core {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 60px;
  height: 60px;
  background: radial-gradient(circle, var(--purple) 0%, rgba(109,60,255,0.3) 70%, transparent 100%);
  border-radius: 50%;
  box-shadow: 0 0 60px var(--purple-glow);
  animation: pulse-core 3s ease-in-out infinite;
}

@keyframes pulse-core {
  0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.9; }
  50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
}

.orbit {
  position: absolute;
  top: 50%;
  left: 50%;
  border: 1px solid rgba(109, 60, 255, 0.15);
  border-radius: 50%;
  transform: translate(-50%, -50%);
}

.orbit-1 {
  width: 140px;
  height: 140px;
  animation: spin 8s linear infinite;
}

.orbit-2 {
  width: 220px;
  height: 220px;
  animation: spin 14s linear infinite reverse;
}

.orbit-3 {
  width: 300px;
  height: 300px;
  animation: spin 20s linear infinite;
}

.dot {
  position: absolute;
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

.orbit-1 .dot { background: var(--lime); top: -4px; left: 50%; transform: translateX(-50%); box-shadow: 0 0 12px var(--lime); }
.orbit-2 .dot { background: var(--purple); bottom: -4px; left: 50%; transform: translateX(-50%); box-shadow: 0 0 12px var(--purple); }
.orbit-3 .dot { background: #45D8FF; top: 50%; right: -4px; transform: translateY(-50%); box-shadow: 0 0 12px #45D8FF; }

@keyframes spin {
  from { transform: translate(-50%, -50%) rotate(0deg); }
  to { transform: translate(-50%, -50%) rotate(360deg); }
}

.sub {
  font-size: 14px;
  color: rgba(136, 146, 168, 0.6);
  letter-spacing: 3px;
  text-transform: uppercase;
}
</style>
</head>
<body>

<canvas id="bg"></canvas>

<div class="content">
  <div class="logo">∧ux<span>pages</span></div>
  <div class="orbit-container">
    <div class="core"></div>
    <div class="orbit orbit-1"><div class="dot"></div></div>
    <div class="orbit orbit-2"><div class="dot"></div></div>
    <div class="orbit orbit-3"><div class="dot"></div></div>
  </div>
  <div class="sub">aux test environment</div>
</div>

<script>
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let w, h, particles = [];

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}

function init() {
  resize();
  particles = [];
  const count = Math.floor((w * h) / 25000);
  for (let i = 0; i < count; i++) {
    particles.push({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 1.5 + 0.5,
      alpha: Math.random() * 0.5 + 0.1
    });
  }
}

function draw() {
  ctx.clearRect(0, 0, w, h);

  particles.forEach((p, i) => {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0) p.x = w;
    if (p.x > w) p.x = 0;
    if (p.y < 0) p.y = h;
    if (p.y > h) p.y = 0;

    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(109, 60, 255, ${p.alpha})`;
    ctx.fill();

    for (let j = i + 1; j < particles.length; j++) {
      const p2 = particles[j];
      const dx = p.x - p2.x;
      const dy = p.y - p2.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.strokeStyle = `rgba(109, 60, 255, ${0.08 * (1 - dist / 120)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  });

  requestAnimationFrame(draw);
}

window.addEventListener('resize', resize);
init();
draw();
</script>
</body>
</html>
