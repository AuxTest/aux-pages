<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0f0f0f;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:system-ui,-apple-system,sans-serif;color:#888;gap:24px}
  .emoji{font-size:72px;line-height:1;filter:grayscale(.3)}
  h1{font-size:14px;font-weight:400;letter-spacing:.3em;text-transform:uppercase;color:#444}
  p{font-size:12px;color:#333}
  a{color:#555;text-decoration:none;border-bottom:1px solid #222;padding-bottom:2px}
  a:hover{color:#777;border-color:#444}
</style>
</head>
<body>
  <div class="emoji">🪹</div>
  <h1>Пусто. Пока.</h1>
  <p><!-- nothing to see here --></p>
</body>
</html>
